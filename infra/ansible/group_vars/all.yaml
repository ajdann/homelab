vm_ssh_pub_key: "{{ '' if vagrant_run | default(false) else lookup('file', playbook_dir + '/../../../secrets/vm_ssh_pub_key') }}"
local_env_file_path: '{{ playbook_dir }}/../../../secrets/.env'
remote_env_file_path: '{{ ansible_user_dir }}/.env'
kubeconfig_dest_path: '{{ playbook_dir }}/../../../secrets/kubeconfig'
flux_components_path: '{{ playbook_dir }}/../../../kubernetes/clusters/homelab/flux-system'
