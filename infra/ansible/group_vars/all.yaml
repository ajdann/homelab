kubernetes_tls_sans: 'localhost, 127.0.0.1'
remote_kubeconfig_path: /etc/rancher/k3s/k3s.yaml

# Default VM credentials (paths relative to playbook dir: playbooks/ -> repo root = ../../../)
# When using Vagrant (vagrant_run: true in inventory), these defaults are used instead of file lookups
vm_user: "{{ 'vagrant' if vagrant_run | default(false) else lookup('file', playbook_dir + '/../../../secrets/vm_user') }}"
