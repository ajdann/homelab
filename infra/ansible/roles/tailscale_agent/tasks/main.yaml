---
- name: Include OS-specific installation tasks
  include_tasks: 'install-{{ ansible_os_family | lower }}.yaml'

- name: Ensure Tailscale service is enabled
  systemd:
    name: tailscaled
    enabled: yes
    state: started

- name: Check if already authenticated
  command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Authenticate with Tailscale
  command: '{{ tailscale_auth_command }}'
  when:
    - not (tailscale_status.stdout | from_json).Self.ID
    - tailscale_auth_key is defined
  register: tailscale_auth_result
  changed_when: tailscale_auth_result.rc == 0

- name: Verify Tailscale installation
  command: tailscale status
  register: tailscale_verify
  changed_when: false
