- name: Apply Flux Operator installation manifests
  kubernetes.core.k8s:
    kubeconfig: '{{ remote_kubeconfig_path }}'
    state: present
    src: 'https://github.com/controlplaneio-fluxcd/flux-operator/releases/latest/download/install.yaml'
  register: flux_operator_install_result
  failed_when: flux_operator_install_result.failed
  vars:
    ansible_python_interpreter: /opt/pyenv/bin/python3
  become: true

- name: Wait for Flux Operator deployment to be ready
  kubernetes.core.k8s_info:
    kubeconfig: '{{ remote_kubeconfig_path }}'
    api_version: apps/v1
    kind: Deployment
    name: flux-operator
    namespace: flux-operator-system
    wait: true
    wait_condition:
      type: Available
      status: 'True'
    wait_timeout: 30
  register: flux_operator_ready_result
  failed_when:
    - flux_operator_ready_result.failed
    - flux_operator_ready_result.resources | length == 0
  vars:
    ansible_python_interpreter: /opt/pyenv/bin/python3
  become: true

- name: Wait for FluxInstance CRD to be available
  kubernetes.core.k8s_info:
    kubeconfig: '{{ remote_kubeconfig_path }}'
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: fluxinstances.fluxcd.controlplane.io
    wait: true
    wait_condition:
      type: Established
      status: 'True'
    wait_timeout: 120
  register: fluxinstance_crd_result
  failed_when:
    - fluxinstance_crd_result.failed
    - fluxinstance_crd_result.resources | length == 0
  vars:
    ansible_python_interpreter: /opt/pyenv/bin/python3
  become: true

- name: Find all manifest files in kubernetes/flux
  ansible.builtin.find:
    paths: '{{ flux_components_path}}'
    patterns: '*.yaml'
  register: flux_manifests

- name: Apply FluxInstance first
  kubernetes.core.k8s:
    kubeconfig: '{{ remote_kubeconfig_path }}'
    state: present
    src: '{{ item.path }}'
  loop: '{{ flux_manifests.files }}'
  when: "'fluxInstance' in item.path"
  register: flux_instance_result
  failed_when: flux_instance_result.failed
  vars:
    ansible_python_interpreter: /opt/pyenv/bin/python3
  become: true

- name: Debug - Checking for Flux controllers deployment
  debug:
    msg: \"Waiting for Flux controllers: source-controller, kustomize-controller, helm-controller, notification-controller\"

- name: Wait for Flux controllers to be deployed by FluxInstance
  kubernetes.core.k8s_info:
    kubeconfig: '{{ remote_kubeconfig_path }}'
    api_version: apps/v1
    kind: Deployment
    name: '{{ controller_name }}'
    namespace: flux-system
    wait: true
    wait_condition:
      type: Available
      status: 'True'
    wait_timeout: 300
  loop:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
  loop_control:
    loop_var: controller_name
  vars:
    ansible_python_interpreter: /opt/pyenv/bin/python3
  environment:
    ANSIBLE_PYTHON_INTERPRETER: /opt/pyenv/bin/python3
  register: flux_controllers_result
  failed_when: false
  become: true

- name: Debug - Show controller deployment results
  debug:
    msg: \"Controller {{ item.controller_name }} - Found: {{ item.resources | length > 0 }}, Available: {{ item.resources[0].status.conditions | selectattr('type', 'equalto', 'Available') | selectattr('status', 'equalto', 'True') | list | length > 0 if item.resources | length > 0 else false }}\"
  loop: \"{{ flux_controllers_result.results }}\"
  when: flux_controllers_result.results is defined

- name: Fail if controllers are not available
  fail:
    msg: \"Flux controllers are not ready. Check FluxInstance configuration and operator logs.\"
  when:
    - flux_controllers_result.results is defined
    - flux_controllers_result.results | selectattr('resources', 'equalto', []) | list | length > 0

- name: Debug - Show what CRDs we're about to wait for
  debug:
    msg: "Waiting for Flux Toolkit CRDs: gitrepositories, kustomizations, helmrepositories, helmreleases"

- name: Check current CRDs status before waiting
  kubernetes.core.k8s_info:
    kubeconfig: '{{ remote_kubeconfig_path }}'
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
  register: current_crds
  vars:
    ansible_python_interpreter: /opt/pyenv/bin/python3
  become: true
  ignore_errors: true

- name: Debug - Show all CRDs currently in cluster
  debug:
    msg: "Current CRDs: {{ current_crds.resources | map(attribute='metadata.name') | list }}"
  when: current_crds.resources is defined

- name: Wait for Flux Toolkit CRDs to be available
  kubernetes.core.k8s_info:
    kubeconfig: '{{ remote_kubeconfig_path }}'
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: '{{ item }}'
    wait: true
    wait_condition:
      type: Established
      status: 'True'
    wait_timeout: 180
  loop:
    - gitrepositories.source.toolkit.fluxcd.io
    - kustomizations.kustomize.toolkit.fluxcd.io
    - helmrepositories.source.toolkit.fluxcd.io
    - helmreleases.helm.toolkit.fluxcd.io
  register: flux_crds_result
  failed_when: false
  vars:
    ansible_python_interpreter: /opt/pyenv/bin/python3
  become: true

- name: Debug - Show CRD wait results
  debug:
    msg: "CRD {{ item.item }} - Found: {{ item.resources | length > 0 }}, Failed: {{ item.failed | default(false) }}"
  loop: "{{ flux_crds_result.results }}"
  when: flux_crds_result.results is defined

- name: Fail if CRDs are not available after timeout
  fail:
    msg: "Timeout waiting for Flux Toolkit CRDs. Check that FluxInstance is properly configured and Flux controllers are running."
  when:
    - flux_crds_result.results is defined
    - flux_crds_result.results | selectattr('failed', 'equalto', true) | list | length > 0 or flux_crds_result.results | selectattr('resources', 'equalto', []) | list | length > 0

- name: Apply remaining Flux manifests
  kubernetes.core.k8s:
    kubeconfig: '{{ remote_kubeconfig_path }}'
    state: present
    src: '{{ item.path }}'
  loop: '{{ flux_manifests.files }}'
  when: "'fluxInstance' not in item.path"
  register: flux_resources_apply_result
  failed_when: flux_resources_apply_result.failed
  vars:
    ansible_python_interpreter: /opt/pyenv/bin/python3
  become: true

- name: Verify all Flux components are healthy
  kubernetes.core.k8s_info:
    kubeconfig: '{{ remote_kubeconfig_path }}'
    api_version: apps/v1
    kind: Deployment
    namespace: flux-system
  register: flux_final_check
  failed_when: >
    flux_final_check.resources | length == 0 or
    flux_final_check.resources | 
    selectattr('status.readyReplicas', 'undefined') | 
    list | length > 0
  vars:
    ansible_python_interpreter: /opt/pyenv/bin/python3
  become: true

- name: Display Flux deployment status
  debug:
    msg:
      - 'Flux deployments found: {{ flux_final_check.resources | length }}'
      - "Ready deployments: {{ flux_final_check.resources | selectattr('status.readyReplicas', 'defined') | list | length }}"
      - "Deployment names: {{ flux_final_check.resources | map(attribute='metadata.name') | list }}"
